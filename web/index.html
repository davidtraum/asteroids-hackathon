<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Astroid Rust - Macroquad WASM</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
        background: #0c1018;
        color: #edf4ff;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        gap: 12px;
        width: min(100vw, 1120px);
        padding: 16px;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
      }

      p {
        margin: 0;
        color: #aebcd0;
        font-size: 14px;
      }

      canvas {
        width: 100%;
        aspect-ratio: 16 / 9;
        max-height: calc(100vh - 96px);
        background: #10141f;
        border: 1px solid #283345;
        outline: none;
      }

      canvas:focus {
        border-color: #50dcaa;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Astroid Rust</h1>
        <p>Click the canvas, then use arrow keys and Space.</p>
      </header>
      <canvas id="glcanvas" tabindex="1"></canvas>
    </main>

    <script src="./mq_js_bundle.js"></script>
    <script>
      load(`./astroid-rust.wasm?v=${Date.now()}`);

      if (location.hostname === "localhost" || location.hostname === "127.0.0.1") {
        const reloadEvents = new EventSource("/__reload");
        reloadEvents.addEventListener("reload", () => location.reload());
      }
    </script>
  </body>
</html>
